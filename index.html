<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix | Filmes e Séries Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-principal">
        <div class="container flex-header">
            <h1 class="logo">DEV<span>FLIX</span></h1>
            <nav class="menu-nav">
                <ul class="flex-menu">
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Séries</a></li>
                    <li><a href="#">Filmes</a></li>
                    <li><a href="#">Bombando</a></li>
                </ul>
            </nav>
            <div class="perfil">
                <img src="https://ui-avatars.com/api/?name=User&background=E50914&color=fff" alt="Perfil" class="avatar">
            </div>
        </div>
    </header>

    <section class="banner-destaque">
        <div class="container content-banner">
            <h2 class="titulo-filme">CSS: O Despertar do Flexbox</h2>
            <p class="sinopse">Em um mundo dominado por floats e tabelas, um desenvolvedor descobre o poder de alinhar itens sem perder a sanidade.</p>
            
            <div class="botoes-acao">
                <button class="btn btn-play">▶ Assistir</button>
                <button class="btn btn-info">ⓘ Mais informações</button>
            </div>
        </div>
    </section>

    <main class="container">
        <h3 class="sessao-titulo">Populares no DevFlix</h3>
        
        <section class="grid-filmes">
            
            <article class="card-filme">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300&h=450&fit=crop" alt="Filme 1">
                <div class="card-info">
                    <div class="card-header">
                        <h4>Matrix Code</h4>
                        <span class="nota">4.9</span>
                    </div>
                </div>
            </article>

            <article class="card-filme">
                <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=300&h=450&fit=crop" alt="Filme 2">
                <div class="card-info">
                    <div class="card-header">
                        <h4>The Script</h4>
                        <span class="nota">4.5</span>
                    </div>
                </div>
            </article>

            <article class="card-filme">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&h=450&fit=crop" alt="Filme 3">
                <div class="card-info">
                    <div class="card-header">
                        <h4>Bug Hunter</h4>
                        <span class="nota">4.2</span>
                    </div>
                </div>
            </article>

            <article class="card-filme">
                <img src="https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?w=300&h=450&fit=crop" alt="Filme 4">
                <div class="card-info">
                    <div class="card-header">
                        <h4>Final Deploy</h4>
                        <span class="nota">5.0</span>
                    </div>
                </div>
            </article>

        </section>
    </main>

</body>
</html>
